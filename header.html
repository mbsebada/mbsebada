<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 900px;
    height: 280px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .container {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 56px;
    gap: 48px;
  }
  .left {
    flex: 1;
  }
  .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f97316;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 36px;
    font-weight: 800;
    color: #fafafa;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 15px;
    color: #a1a1aa;
    line-height: 1.5;
  }
  .right {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #d4d4d8;
    white-space: nowrap;
  }
  .chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.ts { background: #3178c6; }
  .dot.py { background: #3572A5; }
  .dot.linux { background: #e95420; }
  .dot.docker { background: #2496ED; }
  .dot.ai { background: #f97316; }
  .dot.n8n { background: #ea4b71; }
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.1;
    pointer-events: none;
  }
  .glow-1 { background: #f97316; top: -80px; right: 40px; }
  .glow-2 { background: #3178c6; bottom: -120px; left: 20px; opacity: 0.06; }
  .divider {
    width: 1px;
    height: 140px;
    background: rgba(255,255,255,0.08);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="left">
      <div class="label">Veteran &bull; Columbia &bull; NYC</div>
      <h1>Miguel Sebada</h1>
      <div class="tagline">Building AI systems that actually run things.</div>
    </div>
    <div class="divider"></div>
    <div class="right">
      <div class="chip"><div class="dot ts"></div>TypeScript</div>
      <div class="chip"><div class="dot py"></div>Python</div>
      <div class="chip"><div class="dot ai"></div>Claude / GPT / Gemini</div>
      <div class="chip"><div class="dot docker"></div>Docker + Traefik</div>
      <div class="chip"><div class="dot linux"></div>Linux / VPS</div>
      <div class="chip"><div class="dot n8n"></div>n8n Automation</div>
    </div>
  </div>
</body>
</html>
